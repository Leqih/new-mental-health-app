<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MindCare · Mental Wellness</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; overscroll-behavior: none; }
    body {
      background: #faf7f5;
      font-family: 'Sofia Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    #root {
      min-height: 100vh;
    }
    /* Isolate internal scroll areas — prevents scroll from bubbling to browser */
    .hide-scrollbar,
    [style*="overflow-y: auto"],
    [style*="overflow-y:auto"],
    [style*="overflowY: auto"] {
      overscroll-behavior: contain;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: none; }
    }
    /* Cloud character animations */
    @keyframes cloudSad {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes cloudGood {
      0%, 100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-14px) scale(1.04); }
      60%      { transform: translateY(-4px) scale(0.98); }
    }
    @keyframes cloudHappy {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25%      { transform: translateY(-12px) rotate(6deg) scale(1.04); }
      60%      { transform: translateY(-4px) rotate(-3deg) scale(1.01); }
    }
    @keyframes cloudGrateful {
      0%   { transform: translateY(0px) rotate(0deg) scale(1); }
      18%  { transform: translateY(7px) rotate(11deg) scale(0.94); }
      28%  { transform: translateY(7px) rotate(11deg) scale(0.94); }
      50%  { transform: translateY(-16px) rotate(-5deg) scale(1.08); }
      65%  { transform: translateY(-11px) rotate(3deg) scale(1.04); }
      80%  { transform: translateY(-6px) rotate(-1deg) scale(1.02); }
      100% { transform: translateY(0px) rotate(0deg) scale(1); }
    }
    @keyframes cloudAngry {
      0%, 100% { transform: rotate(0deg) scale(1); }
      20%      { transform: rotate(-5deg) scale(1.03); }
      40%      { transform: rotate(5deg) scale(1.03); }
      60%      { transform: rotate(-3deg) scale(1.01); }
      80%      { transform: rotate(3deg) scale(1.01); }
    }
    @keyframes cloudBoring {
      0%   { transform: translateY(0px) rotate(0deg) scaleX(1); }
      18%  { transform: translateY(4px) rotate(-9deg) scaleX(0.97); }
      32%  { transform: translateY(8px) rotate(-16deg) scaleX(0.95); }
      37%  { transform: translateY(-12px) rotate(6deg) scaleX(1.05); }
      44%  { transform: translateY(2px) rotate(-2deg) scaleX(1); }
      50%  { transform: translateY(0px) rotate(0deg) scaleX(1); }
      100% { transform: translateY(0px) rotate(0deg) scaleX(1); }
    }
    @keyframes cloudExhausted {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30%      { transform: translateY(3px) rotate(-2deg); }
      70%      { transform: translateY(3px) rotate(2deg); }
    }
    @keyframes tearFall {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      80%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(28px) scaleY(1.4); }
    }
    @keyframes orbPulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%      { transform: scale(1.12); opacity: 1; }
    }
    @keyframes orbRipple {
      0%   { transform: scale(1);    opacity: 0.45; }
      100% { transform: scale(1.6);  opacity: 0; }
    }
    @keyframes orbBreath {
      0%, 100% { transform: scale(1);    opacity: 0.9; }
      50%      { transform: scale(1.06); opacity: 1; }
    }
    @keyframes liquidBlob {
      0%   { border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%; }
      20%  { border-radius: 40% 60% 54% 46% / 48% 62% 38% 52%; }
      40%  { border-radius: 56% 44% 38% 62% / 40% 56% 44% 60%; }
      60%  { border-radius: 44% 56% 62% 38% / 52% 38% 62% 48%; }
      80%  { border-radius: 58% 42% 48% 52% / 44% 58% 42% 56%; }
      100% { border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%; }
    }
    @keyframes fluidFloat1 {
      0%, 100% { transform: translate(0%,   0%)  scale(1);    }
      33%      { transform: translate(14%,  12%) scale(1.12); }
      66%      { transform: translate(-8%,  22%) scale(0.94); }
    }
    @keyframes fluidFloat2 {
      0%, 100% { transform: translate(0%,   0%)   scale(1);    }
      40%      { transform: translate(-13%, -16%) scale(1.18); }
      70%      { transform: translate(10%,  -9%)  scale(0.88); }
    }
    @keyframes fluidFloat3 {
      0%, 100% { transform: translate(0%,   0%)  scale(1);    }
      50%      { transform: translate(-10%, 14%) scale(1.1);  }
    }
    @keyframes eyeIdle {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.15); }
    }
    @keyframes eyeHappy {
      0%, 80%, 100% { transform: scaleY(1); }
      88%           { transform: scaleY(0.08); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0.08); }
    }
    @keyframes eyeBlink {
      0%, 88%, 100% { transform: scaleY(0); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0); }
    }
    @keyframes faceBlink {
      0%, 88%, 100% { transform: scaleY(1); }
      91%           { transform: scaleY(0.15); }
      94%           { transform: scaleY(1); }
    }
    @keyframes smileHappy {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      40%      { transform: scaleX(1.08) scaleY(1.12); }
      70%      { transform: scaleX(1.04) scaleY(1.06); }
    }
    @keyframes moodFadeIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideFromRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideFromLeft {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    @keyframes slideOutToRight {
      from { transform: translateX(0); }
      to   { transform: translateX(100%); }
    }
    .hide-scrollbar {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-track { display: flex; gap: 8px; width: max-content; animation: marquee 14s linear infinite; }
    .marquee-track:hover { animation-play-state: paused; }
    @keyframes fluid1 { 0%,100%{border-radius:60% 40% 55% 45%/50% 60% 40% 50%;transform:translate(0,0) scale(1)} 33%{border-radius:40% 60% 45% 55%/60% 40% 55% 45%;transform:translate(12px,-8px) scale(1.05)} 66%{border-radius:55% 45% 60% 40%/45% 55% 45% 55%;transform:translate(-8px,10px) scale(0.97)} }
    @keyframes fluid2 { 0%,100%{border-radius:45% 55% 40% 60%/55% 45% 60% 40%;transform:translate(0,0) scale(1)} 33%{border-radius:60% 40% 55% 45%/40% 60% 45% 55%;transform:translate(-10px,8px) scale(0.95)} 66%{border-radius:40% 60% 60% 40%/60% 40% 40% 60%;transform:translate(14px,-6px) scale(1.08)} }
    @keyframes fluid3 { 0%,100%{border-radius:55% 45% 45% 55%/40% 55% 45% 60%;transform:translate(0,0) scale(1)} 33%{border-radius:45% 55% 60% 40%/55% 40% 60% 45%;transform:translate(8px,12px) scale(1.06)} 66%{border-radius:60% 40% 40% 60%/45% 60% 55% 40%;transform:translate(-12px,-10px) scale(0.94)} }
    .fluid-blob1 { animation: fluid1 9s ease-in-out infinite; }
    .fluid-blob2 { animation: fluid2 11s ease-in-out infinite; }
    .fluid-blob3 { animation: fluid3 13s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="src/assets.js?v=77"></script>
  <script type="text/babel" src="src/components/FaceCells.js"></script>
  <script type="text/babel" src="src/components/HomeWidgets.js?v=4"></script>
  <script type="text/babel" src="src/components/StickerZones.js?v=72"></script>
  <script type="text/babel" src="src/components/DayCard.js?v=20"></script>
  <script type="text/babel">
    /* inline override — cache-proof mood SVG characters */
    (function(){
      const _cloud = (c1, c2, face) => {
        const rid = Math.random().toString(36).slice(2,6);
        return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:100%"><defs><radialGradient id="g${rid}" cx="42%" cy="32%" r="68%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></radialGradient></defs><circle cx="36" cy="56" r="24" fill="url(#g${rid})"/><circle cx="52" cy="44" r="28" fill="url(#g${rid})"/><circle cx="68" cy="56" r="22" fill="url(#g${rid})"/><rect x="19" y="56" width="62" height="22" rx="11" fill="url(#g${rid})"/><ellipse cx="46" cy="33" rx="9" ry="5" fill="white" opacity="0.38"/>${face}</svg>`;
      };
      window.moodCharSVG = (mood) => {
        const s = (mood||'').toLowerCase();
        if (s==='good')      return _cloud('#edfae8','#80d070',`<circle cx="42" cy="58" r="4" fill="#1a2a1a"/><circle cx="60" cy="58" r="4" fill="#1a2a1a"/><path d="M40 67 Q51 75 62 67" stroke="#1a2a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`);
        if (s==='happy')     return _cloud('#fdf8cc','#e8c810',`<path d="M37 55 Q41 51 45 55" stroke="#2a2000" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M57 55 Q61 51 65 55" stroke="#2a2000" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M38 65 Q51 76 64 65" stroke="#2a2000" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M38 65 Q51 76 64 65 L64 70 Q51 80 38 70 Z" fill="#e05030" opacity="0.8"/>`);
        if (s==='grateful')  return _cloud('#fef3e0','#f0a840',`<circle cx="42" cy="58" r="4.2" fill="#3a1a00"/><circle cx="60" cy="58" r="4.2" fill="#3a1a00"/><path d="M40 68 Q51 75 62 68" stroke="#3a1a00" stroke-width="2.8" fill="none" stroke-linecap="round"/><path d="M26 40 L28 35 L30 40 L35 38 L31 41 L33 46 L28 43 L23 46 L25 41 L21 38 Z" fill="#ff9020" opacity="0.9"/>`);
        if (s==='angry')     return _cloud('#ffe8e8','#f06060',`<path d="M36 51 L42 46 L47 51" stroke="#3a0000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M55 51 L61 46 L66 51" stroke="#3a0000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="42" cy="57" r="4" fill="#3a0000"/><circle cx="60" cy="57" r="4" fill="#3a0000"/><path d="M40 67 Q51 63 62 67" stroke="#3a0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>`);
        if (s==='exhausted') return _cloud('#f0ecff','#a888d0',`<path d="M37 53 L45 61 M45 53 L37 61" stroke="#1a0a3a" stroke-width="2.8" stroke-linecap="round"/><path d="M57 53 L65 61 M65 53 L57 61" stroke="#1a0a3a" stroke-width="2.8" stroke-linecap="round"/><path d="M39 70 Q43 66 47 69 Q51 72 55 68 Q59 64 63 68" stroke="#1a0a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`);
        if (s==='boring')    return _cloud('#e0f8f6','#48b8b2',`<line x1="38" y1="56" x2="46" y2="56" stroke="#002a28" stroke-width="2.5" stroke-linecap="round"/><line x1="56" y1="56" x2="64" y2="56" stroke="#002a28" stroke-width="2.5" stroke-linecap="round"/><path d="M40 67 Q51 64 62 67" stroke="#002a28" stroke-width="2.5" fill="none" stroke-linecap="round"/>`);
        if (s==='anxious')   return _cloud('#ffe8f4','#f06090',`<circle cx="42" cy="57" r="5" fill="#2a001a"/><circle cx="60" cy="57" r="5" fill="#2a001a"/><path d="M39 68 Q43 65 47 68 Q51 71 55 68 Q59 65 63 68" stroke="#2a001a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`);
        if (s==='excited')   return _cloud('#fff0cc','#ffc040',`<path d="M37 55 Q41 50 45 55" stroke="#3a1a00" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M57 55 Q61 50 65 55" stroke="#3a1a00" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M38 64 Q51 76 64 64" stroke="#3a1a00" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M48 40 L50 34 L52 40 L58 38 L53 42 L55 48 L50 44 L45 48 L47 42 L42 38 Z" fill="#ff8800" opacity="0.9"/>`);
        return _cloud('#e8f5ff','#70c0f0',`<circle cx="42" cy="58" r="4" fill="#1a1a3a"/><circle cx="60" cy="58" r="4" fill="#1a1a3a"/><path d="M40 70 Q51 63 62 70" stroke="#1a1a3a" stroke-width="2.8" fill="none" stroke-linecap="round"/><ellipse cx="38" cy="66" rx="2.2" ry="3.5" fill="#50b8f0" opacity="0.85"/>`);
      };
      window.moodCharSrc = m => `data:image/svg+xml,${encodeURIComponent(window.moodCharSVG(m))}`;
      window.buildIconHTML = m => window.buildFigmaMoodIconHTML ? window.buildFigmaMoodIconHTML(m) : window.moodCharSVG(m);
    })();
  </script>
  <script type="text/babel" src="src/components/LogMoodPage.js?v=17"></script>

  <script type="text/babel" src="src/components/SupportPage.js?v=95"></script>
  <script type="text/babel" src="src/components/MessagesPage.js?v=3"></script>
  <script type="text/babel" src="src/components/BottomNav.js?v=3"></script>
  <script type="text/babel" src="src/App.js?v=94"></script>

</body>
