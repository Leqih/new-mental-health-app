  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #ddd7ce;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Sofia Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 24px 0;
    }
    @media (max-width: 430px) {
      body { padding: 12px 0; align-items: flex-start; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: none; }
    }
    /* Cloud character animations */
    @keyframes cloudSad {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes cloudGood {
      0%, 100% { transform: translateY(0) scale(1); }
      30%      { transform: translateY(-14px) scale(1.04); }
      60%      { transform: translateY(-4px) scale(0.98); }
    }
    @keyframes cloudHappy {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25%      { transform: translateY(-12px) rotate(6deg) scale(1.04); }
      60%      { transform: translateY(-4px) rotate(-3deg) scale(1.01); }
    }
    @keyframes cloudGrateful {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      40%      { transform: translateY(-8px) rotate(4deg); }
      70%      { transform: translateY(-3px) rotate(-2deg); }
    }
    @keyframes cloudAngry {
      0%, 100% { transform: rotate(0deg) scale(1); }
      20%      { transform: rotate(-5deg) scale(1.03); }
      40%      { transform: rotate(5deg) scale(1.03); }
      60%      { transform: rotate(-3deg) scale(1.01); }
      80%      { transform: rotate(3deg) scale(1.01); }
    }
    @keyframes cloudBoring {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-5px) rotate(-1deg); }
    }
    @keyframes cloudExhausted {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30%      { transform: translateY(3px) rotate(-2deg); }
      70%      { transform: translateY(3px) rotate(2deg); }
    }
    @keyframes tearFall {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      80%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(28px) scaleY(1.4); }
    }
    @keyframes eyeIdle {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.15); }
    }
    @keyframes eyeHappy {
      0%, 80%, 100% { transform: scaleY(1); }
      88%           { transform: scaleY(0.08); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0.08); }
    }
    @keyframes eyeBlink {
      0%, 88%, 100% { transform: scaleY(0); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0); }
    }
    @keyframes faceBlink {
      0%, 88%, 100% { transform: scaleY(1); }
      91%           { transform: scaleY(0.15); }
      94%           { transform: scaleY(1); }
    }
    @keyframes smileHappy {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      40%      { transform: scaleX(1.08) scaleY(1.12); }
      70%      { transform: scaleX(1.04) scaleY(1.06); }
    }
    @keyframes moodFadeIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideFromRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideFromLeft {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    @keyframes slideOutToRight {
      from { transform: translateX(0); }
      to   { transform: translateX(100%); }
    }
  </style>
</head>

    const getWaveBars = (mood, peakShift = 0) => {
      const p = mood==='Grateful'
        ? { peak:'#f0a040', c1:'#f5be78', c2:'#f8d0a0', c3:'#fae0c0', c4:'#fcedd8' }

        : mood==='Good'
        ? { peak:'#7dd87c', c1:'#a8e0a7', c2:'#bee8bd', c3:'#d0f0cf', c4:'#e4f8e3' }
        : mood==='Exhausted'
        ? { peak:'#b4a0e8', c1:'#ccc0ef', c2:'#d8cef5', c3:'#e4dcfa', c4:'#f0ecfd' }
        : mood==='Angry'
        ? { peak:'#ff7070', c1:'#ffaaaa', c2:'#ffc0c0', c3:'#ffd5d5', c4:'#ffe8e8' }
        : mood==='Boring'
        ? { peak:'#40c8c0', c1:'#80d8d4', c2:'#a8e6e2', c3:'#c0efec', c4:'#d8f5f4' }
        : { peak:'#91e4fb', c1:'#c7ecf7', c2:'#daf6ff', c3:'#e4f9ff', c4:'#eafaff' };
      const hs = [43,43,43,43,43,43,43,52,62,73,84,95,103,112,130,112,103,95,84,73,62,52,43,43,43,43,43,43,43];
      const cs = ['white','white','white','white',p.c4,p.c4,p.c4,p.c4,p.c3,p.c3,p.c3,p.c2,p.c2,p.c1,p.peak,p.c1,p.c2,p.c2,p.c3,p.c3,p.c3,p.c4,p.c4,p.c4,p.c4,'white','white','white','white'];
      const n = hs.length;
      return hs.map((_, i) => {
        const src = Math.max(0, Math.min(n - 1, i - peakShift));
        return { h: hs[src], c: cs[src] };
      });
    };

        return () => el.removeEventListener('touchmove', prevent);
      }, []);

      const onDragStart = (e) => {
        const x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;

      const onDragMove  = (e) => {

        setDragX(Math.max(-90, Math.min(90, dx)));
