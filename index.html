      80%  { transform: translateY(-6px) rotate(-1deg) scale(1.02); }
      100% { transform: translateY(0px) rotate(0deg) scale(1); }
    }
    @keyframes cloudAngry {
      0%, 100% { transform: rotate(0deg) scale(1); }
      20%      { transform: rotate(-5deg) scale(1.03); }
      40%      { transform: rotate(5deg) scale(1.03); }
      60%      { transform: rotate(-3deg) scale(1.01); }
      80%      { transform: rotate(3deg) scale(1.01); }
    }
    @keyframes cloudBoring {
      0%   { transform: translateY(0px) rotate(0deg) scaleX(1); }
      18%  { transform: translateY(4px) rotate(-9deg) scaleX(0.97); }
      32%  { transform: translateY(8px) rotate(-16deg) scaleX(0.95); }
      37%  { transform: translateY(-12px) rotate(6deg) scaleX(1.05); }
      44%  { transform: translateY(2px) rotate(-2deg) scaleX(1); }
      50%  { transform: translateY(0px) rotate(0deg) scaleX(1); }
      100% { transform: translateY(0px) rotate(0deg) scaleX(1); }
    }
    @keyframes cloudExhausted {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      30%      { transform: translateY(3px) rotate(-2deg); }
      70%      { transform: translateY(3px) rotate(2deg); }
    }
    @keyframes tearFall {
      0%   { opacity: 0.9; transform: translateY(0) scale(1); }
      80%  { opacity: 0.4; }
      100% { opacity: 0;   transform: translateY(28px) scaleY(1.4); }
    }
    @keyframes eyeIdle {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.15); }
    }
    @keyframes eyeHappy {
      0%, 80%, 100% { transform: scaleY(1); }
      88%           { transform: scaleY(0.08); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0.08); }
    }
    @keyframes eyeBlink {
      0%, 88%, 100% { transform: scaleY(0); }
      92%           { transform: scaleY(1); }
      96%           { transform: scaleY(0); }
    }
    @keyframes faceBlink {
      0%, 88%, 100% { transform: scaleY(1); }
      91%           { transform: scaleY(0.15); }
      94%           { transform: scaleY(1); }
    }
    @keyframes smileHappy {
      0%, 100% { transform: scaleX(1) scaleY(1); }
      40%      { transform: scaleX(1.08) scaleY(1.12); }
      70%      { transform: scaleX(1.04) scaleY(1.06); }
    }
    @keyframes moodFadeIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes bgFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideFromRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideFromLeft {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }
    @keyframes slideOutToLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    @keyframes slideOutToRight {
      from { transform: translateX(0); }
      to   { transform: translateX(100%); }

    function TodayPhysicsCard({ dateStr, moods, onMoodClick }) {
      const containerRef = useRef(null);
      const phyRef = useRef({ engine:null, runner:null, bodies:[], elems:[], spawned:0, rafId:null });
      const W = 346, H = 94;

      const spawnIcon = useCallback((moodLabel, entryIndex, onMoodClick) => {
        const phy = phyRef.current;
        if (!phy.engine || !containerRef.current || !window.Matter) return;
        const { Bodies, Composite, Body } = window.Matter;
        const r = 19;
        const x = 30 + Math.random() * (W - 60);
        const body = Bodies.circle(x, -r - 5, r, {
          restitution: 0.65, friction: 0.04, frictionAir: 0.012, density: 0.002
        });
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.2);
        Composite.add(phy.engine.world, body);
        const el = document.createElement('div');
        const hasClick = typeof onMoodClick === 'function';
        el.style.cssText = `position:absolute;width:${r*2}px;height:${r*2}px;pointer-events:${hasClick ? 'auto' : 'none'};will-change:transform;cursor:${hasClick ? 'pointer' : 'default'};`;
        el.innerHTML = buildIconHTML(moodLabel);
        if (hasClick) el.addEventListener('click', () => onMoodClick(entryIndex));
        containerRef.current.appendChild(el);
        phy.bodies.push(body);
        phy.elems.push(el);
        phy.spawned++;
      }, []);

      /* Setup engine once */
      useEffect(() => {
        const container = containerRef.current;
        if (!container || !window.Matter) return;
        const { Engine, Bodies, Composite, Runner } = window.Matter;

        const engine = Engine.create({ gravity: { x: 0, y: 1.2 } });
        phyRef.current.engine = engine;

        /* Walls */
        const wall = (x,y,w,h) => Bodies.rectangle(x,y,w,h,{ isStatic:true, restitution:0.5, friction:0.05 });
        Composite.add(engine.world, [
          wall(W/2, H+26, W+100, 52),
          wall(W/2, -26,  W+100, 52),
          wall(-26, H/2,  52, H+100),
          wall(W+26, H/2, 52, H+100),
        ]);

        const runner = Runner.create();
        phyRef.current.runner = runner;
        Runner.run(runner, engine);

        /* RAF DOM sync — reads from phyRef so it always sees latest bodies */
        const tick = () => {
          const phy = phyRef.current;
          phy.bodies.forEach((b, i) => {
            const el = phy.elems[i];
            if (!el) return;
            const r = parseInt(el.style.width) / 2;
            el.style.left      = (b.position.x - r) + 'px';
            el.style.top       = (b.position.y - r) + 'px';
            el.style.transform = 'rotate(' + b.angle + 'rad)';
          });
          phy.rafId = requestAnimationFrame(tick);
        };
        phyRef.current.rafId = requestAnimationFrame(tick);

        /* Device tilt → gravity */
        const onOrient = (e) => {
          const g  = (e.gamma ?? 0);
          const b2 = (e.beta  ?? 45);
          engine.gravity.x = (g / 45) * 1.8;
          engine.gravity.y = Math.max(-0.5, Math.min(2, (b2 - 45) / 45 * 1.5 + 0.3));
        };
        const setupOrient = () => window.addEventListener('deviceorientation', onOrient);
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const tapHandler = () => {
            DeviceOrientationEvent.requestPermission().then(s => {
              if (s === 'granted') setupOrient();
            }).catch(()=>{});
            container.removeEventListener('click', tapHandler);
          };
          container.addEventListener('click', tapHandler);
        } else {
          setupOrient();
        }

        /* Mouse tilt for desktop demo */
        const onMouse = (e) => {
          const rect = container.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top  + rect.height / 2;
          engine.gravity.x = ((e.clientX - cx) / (window.innerWidth  / 2)) * 1.8;
          engine.gravity.y = ((e.clientY - cy) / (window.innerHeight / 2)) * 1.5 + 0.4;
        };
        window.addEventListener('mousemove', onMouse);

        return () => {
          cancelAnimationFrame(phyRef.current.rafId);
          Runner.stop(runner);
          window.removeEventListener('deviceorientation', onOrient);
          window.removeEventListener('mousemove', onMouse);
        };
      }, []);

      /* Spawn icons — handles both initial load and newly logged moods */
      useEffect(() => {
        const phy = phyRef.current;
        if (!phy.engine) return;
        const startIdx = phy.spawned;
        const toSpawn = moods.slice(startIdx);
        toSpawn.forEach((m, i) => setTimeout(() => spawnIcon(m, startIdx + i, onMoodClick), i * 150));
      }, [moods.length]);

      return (
        <div style={{ background:'rgba(60,60,60,0.92)', border:'1px solid rgba(20,20,19,0.07)', height:H, borderRadius:20, boxShadow:'0 4px 24px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.08)', flexShrink:0, width:W, position:'relative', overflow:'hidden' }}>
          <p style={{ position:'absolute', fontFamily:'Sofia Sans,sans-serif', fontWeight:500, lineHeight:'17.5px', left:13, fontSize:14, color:'white', top:11, letterSpacing:'-0.28px', whiteSpace:'nowrap', zIndex:2 }}>Today – {dateStr}</p>
          {/* Physics icon container — icons are imperatively appended here */}
          <div ref={containerRef} style={{ position:'absolute', inset:0, zIndex:1 }} />
        </div>
      );
    }

    /* ── WEEKLY BUBBLES (physics — same engine as TodayPhysicsCard) ── */
    function WeeklyBubblesChart({ pts }) {
      const containerRef   = useRef(null);
      const [selected, setSelected] = useState(null); // { mood, cnt, pct }
      // Expose setter on a container-keyed map so imperative DOM handlers can reach it
      const instanceId = useRef('wbc_' + Math.random().toString(36).slice(2));
      window.__wbcSetSel = window.__wbcSetSel || {};
      window.__wbcSetSel[instanceId.current] = setSelected;

      /* Accent colors per mood for the info pill */
      const MOOD_COLOR = {
        good:'#a8dc78', happy:'#fde76a', excited:'#fde76a', grateful:'#f5c26a',
        sad:'#7abcee', anxious:'#f07898', boring:'#68dcd0', angry:'#f08070',
      };

      useEffect(() => {
        const container = containerRef.current;
        if (!container || !pts || pts.length === 0) return;

        /* Count moods, compute bubble radii */
        const counts = {};
        pts.forEach(p => { if (p.mood) counts[p.mood] = (counts[p.mood] || 0) + 1; });
        const totalCnt  = Object.values(counts).reduce((a,b) => a+b, 0);
        const maxCount  = Math.max(...Object.values(counts), 1);
        const bubbleData = Object.entries(counts).map(([mood, cnt]) => ({
          label: mood, r: Math.round(20 + (cnt / maxCount) * 32), cnt
        }));

        const id = instanceId.current;
        const setSel = (v) => window.__wbcSetSel[id] && window.__wbcSetSel[id](v);

        /* Click on container bg → dismiss selection */
        const onBgClick = (e) => { if (e.target === container) setSel(null); };
        container.addEventListener('click', onBgClick);

        const W = container.clientWidth || 346;
        const H = container.clientHeight || 240;
        const { Engine, Runner, Bodies, Body, World } = Matter;

        /* Physics engine — same params as TodayPhysicsCard */
        const engine = Engine.create({ gravity: { x:0, y:1.2 } });
        const wall = (x,y,w,h) => Bodies.rectangle(x,y,w,h,{ isStatic:true, restitution:0.5, friction:0.05 });
        World.add(engine.world, [
          wall(W/2, H+26, W+100, 52),
          wall(W/2, -26,  W+100, 52),
          wall(-26, H/2,  52, H+100),
          wall(W+26, H/2, 52, H+100),
        ]);

        /* Bubble body HTML — shapes without faces */
        const FACE_BAKED_GRAD = {
          sad:     'linear-gradient(160deg,#cce8ff,#80b8f0)',
          anxious: 'linear-gradient(160deg,#ffb8d0,#f06888)',
        };
        const bubbleBodyHTML = (mood) => {
          const s = mood.toLowerCase();
          const img = (src) => `<img alt="" src="${src}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;pointer-events:none">`;
          if (s === 'boring') return `
            <img alt="" src="${imgBoringChar1}" style="position:absolute;top:0;bottom:0;left:0;right:75%;width:25%;height:100%;display:block;object-fit:cover;pointer-events:none">
            <img alt="" src="${imgBoringChar2}" style="position:absolute;top:0;bottom:0;left:24.99%;right:50%;width:25.01%;height:100%;display:block;object-fit:cover;pointer-events:none">
            <img alt="" src="${imgBoringChar1}" style="position:absolute;top:0;bottom:0;left:50%;right:24.99%;width:25.01%;height:100%;display:block;object-fit:cover;pointer-events:none">
            <img alt="" src="${imgBoringChar2}" style="position:absolute;top:0;bottom:0;left:75%;right:0;width:25%;height:100%;display:block;object-fit:cover;pointer-events:none">`;
          if (s === 'sad' || s === 'anxious') {
            const src = s === 'sad' ? imgLogCloudChar : imgAnxiousChar;
            const grad = FACE_BAKED_GRAD[s];
            const mask = `url(${src}) center/contain no-repeat`;
            return `<div style="position:absolute;inset:0;background:${grad};-webkit-mask:${mask};mask:${mask};pointer-events:none"></div>`;
          }
          const src = s==='good' ? imgGoodChar : s==='happy'||s==='excited' ? imgHappyChar :
                      s==='grateful' ? imgGratefulChar : s==='angry' ? imgAngryChar : imgExhaustedChar;
          return img(src);
        };

        /* Spawn bubbles from top-inside the container, staggered */
        const bodies = [], elems = [];
        bubbleData.forEach(({ label, r, cnt }, idx) => {
          setTimeout(() => {
            const x = r + Math.random() * (W - r * 2);
            const body = Bodies.circle(x, r + 5, r, {
              restitution: 0.65, friction: 0.04, frictionAir: 0.012, density: 0.002,
              inertia: Infinity, inverseInertia: 0  // lock rotation so text stays upright
            });
            World.add(engine.world, body);
            const d = r * 2;
            const fs = r >= 40 ? 13 : r >= 28 ? 11 : 9;
            const el = document.createElement('div');
            el.style.cssText = `position:absolute;width:${d}px;height:${d}px;cursor:pointer;user-select:none;will-change:transform;`;
            el.innerHTML = `
              <div style="position:relative;width:100%;height:100%;">
                ${bubbleBodyHTML(label)}
                <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Sofia Sans',sans-serif;font-weight:700;color:#141413;text-align:center;font-size:${fs}px;line-height:1;padding:0 6px;pointer-events:none;">${label}</span>
              </div>`;
            el.onclick = (e) => {
              e.stopPropagation();
              setSel({ mood: label, cnt, pct: Math.round(cnt / totalCnt * 100) });
            };
            container.appendChild(el);
            bodies.push(body);
            elems.push({ el, r });
          }, idx * 120);
        });

        /* RAF DOM sync — position + rotation, same as TodayPhysicsCard */
        const runner = Runner.create();
        Runner.run(runner, engine);
        let rafId;
        const tick = () => {
          bodies.forEach((b, i) => {
            const { el, r } = elems[i];
            if (!el) return;
            el.style.left = (b.position.x - r) + 'px';
            el.style.top  = (b.position.y - r) + 'px';
            // no rotation — keeps label text upright and readable
          });
          rafId = requestAnimationFrame(tick);
        };
        tick();

        /* Device tilt → gravity — same formula as TodayPhysicsCard */
        const onOrient = (e) => {
          const g  = (e.gamma ?? 0);
          const b2 = (e.beta  ?? 45);
          engine.gravity.x = (g / 45) * 1.8;
          engine.gravity.y = Math.max(-0.5, Math.min(2, (b2 - 45) / 45 * 1.5 + 0.3));
        };
        const setupOrient = () => window.addEventListener('deviceorientation', onOrient);
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          const tapH = () => {
            DeviceOrientationEvent.requestPermission().then(s => {
              if (s === 'granted') setupOrient();
            }).catch(()=>{});
            container.removeEventListener('click', tapH);
          };
          container.addEventListener('click', tapH);
        } else {
          setupOrient();
        }

        /* Mouse tilt — use phone frame as reference so gravity stays sensible */
        const onMouse = (e) => {
          const frame = container.closest('.phone-frame') || document.body;
          const fr = frame.getBoundingClientRect();
          const cx = fr.left + fr.width  / 2;
          const cy = fr.top  + fr.height / 2;
          engine.gravity.x = ((e.clientX - cx) / (fr.width  / 2)) * 1.5;
          engine.gravity.y = ((e.clientY - cy) / (fr.height / 2)) * 1.5 + 0.3;
        };
        window.addEventListener('mousemove', onMouse);

        return () => {
          cancelAnimationFrame(rafId);
          container.removeEventListener('click', onBgClick);
          window.removeEventListener('deviceorientation', onOrient);
          window.removeEventListener('mousemove', onMouse);
          Runner.stop(runner);
          World.clear(engine.world);
          Engine.clear(engine);
          elems.forEach(({ el }) => el.parentNode && el.parentNode.removeChild(el));
          delete window.__wbcSetSel[id];
        };
      }, []);

      const accent = selected ? (MOOD_COLOR[(selected.mood||'').toLowerCase()] || '#e0e0e0') : '#e0e0e0';

      return (
        <div style={{ position:'relative', height:240, overflow:'hidden', margin:'0 -4px' }}>
          {/* Physics bubble canvas */}
          <div ref={containerRef} style={{ position:'absolute', inset:0 }} />

          {/* Info pill — appears at top when a bubble is tapped */}
          {selected && (
            <div style={{ position:'absolute', top:10, left:0, right:0, display:'flex', justifyContent:'center', pointerEvents:'none', zIndex:10 }}>
              <div style={{
                display:'flex', alignItems:'center', gap:8,
                background:'rgba(255,255,255,0.92)', backdropFilter:'blur(10px)', WebkitBackdropFilter:'blur(10px)',
                borderRadius:20, padding:'7px 14px',
                boxShadow:'0 2px 14px rgba(0,0,0,0.1)', border:'1px solid rgba(0,0,0,0.06)'
              }}>
                {/* Colored dot */}
                <div style={{ width:10, height:10, borderRadius:'50%', background:accent, flexShrink:0 }} />
                <span style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:700, fontSize:13, color:'#141413' }}>
                  {selected.mood}
                </span>
                <span style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, fontSize:12, color:'#666' }}>
                  {selected.cnt}× this week
                </span>
                {/* Proportion bar */}
                <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                  <div style={{ width:48, height:5, borderRadius:3, background:'rgba(0,0,0,0.08)', overflow:'hidden' }}>
                    <div style={{ width:`${selected.pct}%`, height:'100%', borderRadius:3, background:accent }} />
                  </div>
                  <span style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:600, fontSize:11, color:'#888' }}>
                    {selected.pct}%
                  </span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── STATS PAGE ── */
    function StatsPage({ onBack, onNav, todayMood, count, allEntries = [] }) {
      const [tab, setTab]       = useState('week');

                      </div>
                      <div style={{ display:'flex', height:24, alignItems:'flex-start', width:'100%' }}>
                        <p style={{ fontFamily:'Sofia Sans,sans-serif', flex:'1 0 0', fontWeight:600, lineHeight:'24px', minWidth:1, color:'#141413', fontSize:20, letterSpacing:'-0.4px' }}>{userName}</p>
                      </div>
                    </div>
                  </div>
                </div>
                {/* Menu button */}
                <div style={{ flexShrink:0, width:38, height:38, display:'flex', alignItems:'center' }}>
                  <div style={{ background:'rgba(255,255,255,0.9)', border:'1px solid rgba(20,20,19,0.08)', flex:'1 0 0', height:38, minWidth:1, borderRadius:19, boxShadow:'0 4px 24px rgba(0,0,0,0.04)', display:'flex', alignItems:'center', justifyContent:'center', padding:'1px 10px' }}>
                    <div style={{ height:12, position:'relative', flexShrink:0, width:18 }}>
                      <img alt="" style={{ position:'absolute', display:'block', inset:0, maxWidth:'none', width:'100%', height:'100%' }} src={imgIcon}
                        onError={e=>{e.target.style.display='none';e.target.parentNode.innerHTML='<svg width="18" height="12" viewBox="0 0 18 12" fill="none"><circle cx="2" cy="2" r="2" fill="rgba(20,20,19,0.5)"/><circle cx="9" cy="2" r="2" fill="rgba(20,20,19,0.5)"/><circle cx="16" cy="2" r="2" fill="rgba(20,20,19,0.5)"/><circle cx="2" cy="10" r="2" fill="rgba(20,20,19,0.5)"/><circle cx="9" cy="10" r="2" fill="rgba(20,20,19,0.5)"/><circle cx="16" cy="10" r="2" fill="rgba(20,20,19,0.5)"/></svg>';}}
                      />
                    </div>
                  </div>
                </div>
              </div>

              {/* ── WEEK STRIP ── */}
              <div style={{ position:'absolute', display:'flex', alignItems:'center', justifyContent:'space-between', left:0, paddingLeft:22, paddingRight:22, paddingTop:12, paddingBottom:12, top:297, width:390 }}>
                <DayCard label="MON"   mood="good" onClick={() => setViewEntry(moodEntries['MON'])} />
                <DayCard label="TUE"   mood="sad"  onClick={() => setViewEntry(moodEntries['TUE'])} />
                <DayCard label="TODAY" mood={moodEntries['TODAY'] ? moodEntries['TODAY'].mood.toLowerCase() : null} onClick={moodEntries['TODAY'] ? () => setViewEntry(moodEntries['TODAY']) : () => setPage('logMood')} />
                <DayCard label="WED"   mood={null}  />
                <DayCard label="THUR"  mood={null}  />
              </div>

              {/* ── DAILY CHECK-IN: top:193 ── */}
              <div onClick={() => todayEntries.length < MAX_MOODS_PER_DAY && setPage('logMood')} style={{ position:'absolute', display:'flex', flexDirection:'column', gap:10, alignItems:'flex-start', left:22, top:193, width:347, cursor: todayEntries.length < MAX_MOODS_PER_DAY ? 'pointer' : 'default', opacity: todayEntries.length >= MAX_MOODS_PER_DAY ? 0.45 : 1 }}>
                <div style={{ height:12, position:'relative', flexShrink:0, width:95 }}>
                  <div style={{ position:'absolute', background:'#fcec6a', left:0, borderRadius:3.5, width:7, height:7, top:2.5 }} />
                  <p style={{ position:'absolute', fontFamily:'Sofia Sans,sans-serif', fontWeight:700, lineHeight:'normal', left:14, color:'#141413', fontSize:10, top:0, letterSpacing:'0.7px', textTransform:'uppercase', whiteSpace:'nowrap' }}>Daily check-in</p>
                </div>
                <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, lineHeight:'35.64px', minWidth:'100%', flexShrink:0, color:'#141413', fontSize:33, letterSpacing:'-0.66px', width:'min-content' }}>
                  {`${greeting}, ${userName}. How do you feel today?`}
                </p>
              </div>

              {/* ── BOTTOM NAV: top:764 ── */}
              <div style={{ position:'absolute', background:'rgba(255,237,229,0.5)', border:'1px solid rgba(20,20,19,0.06)', display:'flex', flexDirection:'column', height:62, alignItems:'center', left:43, padding:6, borderRadius:999, boxShadow:'0 4px 24px rgba(0,0,0,0.04), 0 24px 48px rgba(0,0,0,0.08)', top:764, width:294, zIndex:10 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0, width:'100%' }}>
                  {/* Home (active) */}
                  <div style={{ background:'white', display:'flex', flexDirection:'column', height:51, alignItems:'center', justifyContent:'center', paddingLeft:11, paddingRight:18, paddingTop:10, paddingBottom:10, borderRadius:999, flexShrink:0, width:115, cursor:'pointer' }}>
                    <div style={{ display:'flex', gap:10, alignItems:'center', flexShrink:0 }}>
                      <div style={{ height:19.93, flexShrink:0, width:18.96, position:'relative' }}>
                        <img alt="" style={{ position:'absolute', display:'block', inset:0, maxWidth:'none', width:'100%', height:'100%' }} src={imgVector3}
                          onError={e=>{e.target.style.display='none';e.target.parentNode.innerHTML='<svg width="19" height="20" viewBox="0 0 24 24" fill="none" stroke="#141413" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>';}}
                        />
                      </div>
                      <p style={{ fontFamily:'Sofia Sans,sans-serif', fontWeight:500, lineHeight:'normal', flexShrink:0, color:'#141413', fontSize:14, textAlign:'center', letterSpacing:'0.3px', textTransform:'uppercase', whiteSpace:'nowrap' }}>Home</p>
                    </div>
                  </div>
                  {/* Stats */}
                  <div onClick={() => setPage('stats')} style={{ background:'white', display:'flex', alignItems:'flex-start', padding:11, borderRadius:23, flexShrink:0, width:46, height:46, cursor:'pointer', boxSizing:'border-box' }}>
                    <div style={{ position:'relative', flexShrink:0, width:24, height:24 }}>
                      <div style={{ position:'absolute', background:'rgba(0,0,0,0.5)', border:'2px solid #808080', bottom:'16.67%', left:'75%', right:'8.33%', borderRadius:1, top:'29.17%' }} />
                      <div style={{ position:'absolute', background:'rgba(0,0,0,0.5)', border:'2px solid #808080', top:'54.17%', right:'41.67%', bottom:'16.67%', left:'41.67%', borderRadius:1 }} />
                      <div style={{ position:'absolute', background:'rgba(0,0,0,0.5)', border:'2px solid #808080', bottom:'16.67%', left:'8.33%', right:'75%', borderRadius:1, top:'37.5%' }} />
                    </div>
                  </div>
                  {/* Peers */}
                  <div style={{ background:'white', display:'flex', alignItems:'flex-start', paddingBottom:10, paddingTop:12, paddingLeft:11, paddingRight:11, borderRadius:23, flexShrink:0, width:46, height:46, cursor:'pointer', boxSizing:'border-box' }}>
                    <div style={{ flexShrink:0, width:24, height:24, position:'relative' }}>
                      <img alt="" style={{ position:'absolute', display:'block', inset:0, maxWidth:'none', width:'100%', height:'100%' }} src={imgHandCoin}
                        onError={e=>{e.target.style.display='none';e.target.parentNode.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#808080" strokeWidth="1.8" strokeLinecap="round"><circle cx="9" cy="7" r="3"/><path d="M3 21v-1a6 6 0 0112 0v1"/><circle cx="17" cy="9" r="2.5"/><path d="M20 21v-.8a5 5 0 00-4-4.9"/></svg>';}}
                      />
                    </div>
                  </div>
                  {/* Profile */}
                  <div onClick={() => setPage('profile')} style={{ background:'white', display:'flex', alignItems:'flex-start', paddingBottom:9, paddingLeft:10, paddingRight:11, paddingTop:12, borderRadius:23, flexShrink:0, width:46, height:46, cursor:'pointer', boxSizing:'border-box' }}>
                    <div style={{ flexShrink:0, width:25, height:25, position:'relative' }}>
                      <img alt="" style={{ position:'absolute', display:'block', inset:0, maxWidth:'none', width:'100%', height:'100%' }} src={imgShield}
                        onError={e=>{e.target.style.display='none';e.target.parentNode.innerHTML='<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#808080" strokeWidth="1.8" strokeLinecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';}}
                      />
                    </div>
                  </div>
                </div>
              </div>

              {/* Status bar on top */}
              <StatusBar />
            </div>

            {/* Inner highlight ring */}
            <div style={{ position:'absolute', inset:0, pointerEvents:'none', borderRadius:'inherit', boxShadow:'inset 0px 1px 0px 0px rgba(255,255,255,0.12)' }} />

            {/* Today moods list sheet */}
            {showTodaySheet && <TodayMoodsSheet entries={todayEntries} onClose={() => setShowTodaySheet(false)} onViewEntry={e => { setShowTodaySheet(false); setViewEntry(e); }} />}

            {/* Mood detail sheet */}
            {viewEntry && <MoodDetailSheet entry={viewEntry} onClose={() => setViewEntry(null)} />}

            {/* Check-in modal */}
            {checkinOpen && <CheckinSheet onClose={() => setCheckin(false)} onSave={handleSave} />}

            {/* Log Mood page */}
            {page === 'logMood' && <LogMoodPage onBack={() => setPage('home')} onSave={handleLogMoodSave} />}

            {/* Stats page */}
            {page === 'stats' && <StatsPage onBack={() => setPage('home')} onNav={setPage} todayMood={todayMood} count={count} allEntries={[...Object.values(moodEntries), ...todayEntries].filter(Boolean)} />}

            {/* Profile page */}
            {page === 'profile' && <ProfilePage onBack={() => setPage('home')} userName={userName} setUserName={setUserName} />}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
